<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기기 관리 - 유해동물 감지 시스템</title>
  <meta name="description" content="선택한 엣지 기기의 카메라와 통계를 관리합니다" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="header container">
    <button id="backBtn" class="back-btn">← 뒤로가기</button>
    <div id="deviceInfo" style="display: flex; align-items: center; gap: 1.5rem;"></div>
    <button id="deleteDeviceBtn" class="delete-device-btn" style="margin-left: auto;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-top: -1px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
      기기 삭제
    </button>
  </header>

  <main class="container">
    <div style="margin-bottom: 2rem;">
      <h2 style="font-size: 1.25rem; font-weight: 600; color: #fff; margin-bottom: 1rem;">연결된 카메라 목록</h2>
      <section id="cameraList" class="device-grid">
        <!-- Camera cards injected by JS -->
      </section>
    </div>

    <!-- 시스템 리소스 모니터 대시보드 (System Resource Monitor) -->
    <div style="margin-bottom: 2rem;">
      <h2 style="font-size: 1.25rem; font-weight: 600; color: #fff; margin-bottom: 1rem;">시스템 리소스 모니터 (최근 1분 추이)</h2>
      <section class="resource-grid">
        <!-- CPU Card -->
        <div class="card resource-card">
          <div class="resource-header">
            <span class="resource-icon cpu-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="15" x2="23" y2="15"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="15" x2="4" y2="15"></line></svg>
            </span>
            <span class="resource-title">CPU 사용량</span>
          </div>
          <div class="resource-body">
            <div class="resource-value-container">
              <span id="cpuValue" class="resource-value">0%</span>
              <span class="resource-subtitle">4 Cores (ARMv8)</span>
            </div>
            <div class="chart-container" style="position: relative; width: 100%; height: 130px; margin-top: 0.25rem;">
              <canvas id="cpuChart"></canvas>
            </div>
          </div>
        </div>

        <!-- RAM Card -->
        <div class="card resource-card">
          <div class="resource-header">
            <span class="resource-icon ram-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="10" y1="6" x2="10.01" y2="6"></line><line x1="14" y1="6" x2="14.01" y2="6"></line><line x1="18" y1="6" x2="18.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line><line x1="10" y1="18" x2="10.01" y2="18"></line><line x1="14" y1="18" x2="14.01" y2="18"></line><line x1="18" y1="18" x2="18.01" y2="18"></line></svg>
            </span>
            <span class="resource-title">메모리 (RAM)</span>
          </div>
          <div class="resource-body">
            <div class="resource-value-container">
              <span id="ramValue" class="resource-value">0.0 GB / 4.0 GB</span>
              <span id="ramPercent" class="resource-subtitle">0% 사용 중</span>
            </div>
            <div class="chart-container" style="position: relative; width: 100%; height: 130px; margin-top: 0.25rem;">
              <canvas id="ramChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Power Card -->
        <div class="card resource-card">
          <div class="resource-header">
            <span class="resource-icon power-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </span>
            <span class="resource-title">전력 소비량</span>
          </div>
          <div class="resource-body">
            <div class="resource-value-container">
              <span id="powerValue" class="resource-value">0.0 W</span>
              <span id="powerStatus" class="resource-subtitle">Active / Normal Mode</span>
            </div>
            <div class="chart-container" style="position: relative; width: 100%; height: 130px; margin-top: 0.25rem;">
              <canvas id="powerChart"></canvas>
            </div>
          </div>
        </div>

        <!-- Temp Card -->
        <div class="card resource-card">
          <div class="resource-header">
            <span class="resource-icon temp-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path></svg>
            </span>
            <span class="resource-title">CPU 코어 온도</span>
          </div>
          <div class="resource-body">
            <div class="resource-value-container">
              <span id="tempValue" class="resource-value">0.0 °C</span>
              <span id="tempStatus" class="resource-subtitle">적정 상태</span>
            </div>
            <div class="chart-container" style="position: relative; width: 100%; height: 130px; margin-top: 0.25rem;">
              <canvas id="tempChart"></canvas>
            </div>
          </div>
        </div>
      </div>

    <section id="statsPanel" class="card" style="cursor: default; max-width: 800px; margin: 2rem 0 0 0;">
      <h3 style="font-size: 1.2rem; font-weight: 600; color: #fff; margin-bottom: 1.25rem;">기기 통계 요약 (최근 7일)</h3>
      <div style="display: flex; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
        <div>
          <span style="font-size: 0.9rem; color: var(--color-text-secondary);">금일 전체 감지 건수</span>
          <p id="todayCount" style="font-size: 1.8rem; font-weight: 700; color: var(--color-primary-light);">0건</p>
        </div>
        <div style="border-left: 1px solid var(--color-surface-border); padding-left: 2rem;">
          <span style="font-size: 0.9rem; color: var(--color-text-secondary);">주간 전체 감지 건수</span>
          <p id="weekCount" style="font-size: 1.8rem; font-weight: 700; color: var(--color-success);">0건</p>
        </div>
      </div>
      <div class="chart-bar" id="weeklyChart">
        <!-- Simple bar placeholders -->
      </div>
    </section>
  </main>

  <script src="app.js?v=3.0"></script>
  <script src="device.js?v=3.0"></script>
</body>
</html>
